services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      APP_NAME: ${APP_NAME:-CAMO API}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      MODEL_CONFIG_PATH: ${MODEL_CONFIG_PATH:-/app/config/models.yaml}
      DATABASE_URL: postgresql+asyncpg://camo:${POSTGRES_PASSWORD:-changeme}@postgres:5432/camo
      REDIS_URL: redis://redis:6379/0
      DATA_ROOT: ${DATA_ROOT:-/app/data}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  worker:
    build: .
    command: ["sh", "/app/docker/start-worker.sh"]
    volumes:
      - ./data:/app/data
    environment:
      APP_NAME: ${APP_NAME:-CAMO API}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      MODEL_CONFIG_PATH: ${MODEL_CONFIG_PATH:-/app/config/models.yaml}
      DATABASE_URL: postgresql+asyncpg://camo:${POSTGRES_PASSWORD:-changeme}@postgres:5432/camo
      REDIS_URL: redis://redis:6379/0
      DATA_ROOT: ${DATA_ROOT:-/app/data}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    profiles:
      - local-llm

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: camo
      POSTGRES_USER: camo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camo -d camo"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ollama_models:
